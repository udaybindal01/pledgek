# Pytest config for pledge_karma.
# If you see: "ValueError: mutable default ... override_dirname ... use default_factory",
# a global pytest plugin is loading Hydra. Fix options:
#   1. Upgrade Hydra: pip install -U hydra-core
#   2. Or run with plugin disabled: pytest tests/test.py -v -p no:PLUGIN_NAME
#      (Find PLUGIN_NAME: python3 -c "import pkg_resources; [print(d.project_name, list(d.get_entry_map().get('pytest11',{}))) for d in pkg_resources.working_set if d.get_entry_map().get('pytest11')]")
[pytest]
addopts = -v -p no:hydra -p no:hydra_core -p no:hydra_pytest
